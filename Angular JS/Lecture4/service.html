<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product Management - SweetAlert Style</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      .loader-container {
        padding: 50px;
        text-align: center;
      }
      .table td {
        vertical-align: middle;
      }
    </style>
  </head>

  <body ng-app="myApp" ng-controller="myCtrl">
    <div class="container mt-4">
      <h2 class="mb-4 text-center">Product Management System</h2>

      <div class="card mb-4 shadow-sm">
        <div class="card-header fw-bold bg-white">Add New Product</div>
        <div class="card-body">
          <form ng-submit="addProduct()">
            <div class="row g-2">
              <div class="col-md-5">
                <input
                  type="text"
                  class="form-control"
                  ng-model="newProduct.title"
                  placeholder="Product Title"
                  required
                />
              </div>
              <div class="col-md-5">
                <input
                  type="number"
                  step="0.01"
                  class="form-control"
                  ng-model="newProduct.price"
                  placeholder="Price"
                  required
                />
              </div>
              <div class="col-md-2">
                <button
                  type="submit"
                  class="btn btn-primary w-100"
                  ng-disabled="isPosting"
                >
                  {{ isPosting ? 'Saving...' : 'Add' }}
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <div class="loader-container" ng-if="isLoading">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Fetching data...</p>
      </div>

      <div ng-if="!isLoading" class="table-responsive shadow-sm rounded">
        <table class="table table-bordered table-striped mb-0">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Product Name</th>
              <th>Price</th>
              <th style="width: 160px">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr ng-repeat="product in products">
              <td>{{ product.id }}</td>
              <td>
                <span ng-if="!product.isEditing">{{ product.title }}</span>
                <input
                  type="text"
                  class="form-control form-control-sm"
                  ng-if="product.isEditing"
                  ng-model="product.title"
                />
              </td>
              <td>
                <span ng-if="!product.isEditing"
                  >{{ product.price | currency }}</span
                >
                <input
                  type="number"
                  step="0.01"
                  class="form-control form-control-sm"
                  ng-if="product.isEditing"
                  ng-model="product.price"
                />
              </td>
              <td>
                <div ng-if="!product.isEditing" class="d-flex gap-1">
                  <button
                    class="btn btn-sm btn-outline-secondary"
                    ng-click="editProduct(product)"
                  >
                    Edit
                  </button>
                  <button
                    class="btn btn-sm btn-danger"
                    ng-click="removeProduct(product.id, $index)"
                  >
                    Delete
                  </button>
                </div>
                <div ng-if="product.isEditing" class="d-flex gap-1">
                  <button
                    class="btn btn-sm btn-success"
                    ng-click="saveUpdate(product)"
                  >
                    Save
                  </button>
                  <button
                    class="btn btn-sm btn-light border"
                    ng-click="cancelEdit(product)"
                  >
                    Cancel
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      var app = angular.module("myApp", []);

      // SERVICE: Handles all HTTP communication
      app.service("ProductService", function ($http) {
        var apiLink = "https://fakestoreapi.com/products";
        this.getProducts = function () {
          return $http.get(apiLink);
        };
        this.saveProduct = function (p) {
          return $http.post(apiLink, p);
        };
        this.updateProduct = function (id, p) {
          return $http.put(apiLink + "/" + id, p);
        };
        this.deleteProduct = function (id) {
          return $http.delete(apiLink + "/" + id);
        };
      });

      // CONTROLLER: Handles UI Logic
      app.controller("myCtrl", function ($scope, ProductService) {
        $scope.products = [];
        $scope.newProduct = {};
        $scope.isLoading = true;

        // Fetch Data
        $scope.load = function () {
          $scope.isLoading = true;
          ProductService.getProducts()
            .then(function (res) {
              $scope.products = res.data;
            })
            .finally(function () {
              $scope.isLoading = false;
            });
        };

        // Add Product
        $scope.addProduct = function () {
          $scope.isPosting = true;
          ProductService.saveProduct($scope.newProduct)
            .then(function (res) {
              $scope.products.unshift(res.data);
              $scope.newProduct = {};
              Swal.fire({
                icon: "success",
                title: "Added!",
                text: "Product added successfully",
                timer: 2000,
                showConfirmButton: false,
              });
            })
            .finally(function () {
              $scope.isPosting = false;
            });
        };

        // Update Product
        $scope.saveUpdate = function (product) {
          ProductService.updateProduct(product.id, product).then(function () {
            product.isEditing = false;
            Swal.fire({
              icon: "success",
              title: "Updated!",
              text: "Product info saved",
              timer: 1500,
              showConfirmButton: false,
            });
          });
        };

        // Delete Product (With SweetAlert Confirmation)
        $scope.removeProduct = function (id, index) {
          Swal.fire({
            title: "Are you sure?",
            text: "This product will be removed permanently!",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#d33",
            cancelButtonColor: "#6e7881",
            confirmButtonText: "Yes, delete it!",
          }).then((result) => {
            if (result.isConfirmed) {
              ProductService.deleteProduct(id).then(function () {
                $scope.products.splice(index, 1);
                Swal.fire("Deleted!", "Product has been removed.", "success");
              });
            }
          });
        };

        $scope.editProduct = function (p) {
          p.isEditing = true;
        };
        $scope.cancelEdit = function (p) {
          p.isEditing = false;
        };

        $scope.load();
      });
    </script>
  </body>
</html>
