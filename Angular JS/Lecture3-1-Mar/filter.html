<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <title>Filters and injections</title>
  </head>
  <body
    class="bg-light mt-5"
    style="display: flex; align-items: center; justify-content: center"
  >
    <div
      ng-app="filter"
      ng-controller="stuCtrl"
      class="bg-white row p-4 rounded shadow"
    >
      <counter count="count"></counter>
      <!-- <p>{{"aly khairy" | cap }}</p> -->

      <!-- <div ng-repeat="name in stunames ">
        <my-message title="{{name}}"></my-message>
      </div> -->
    </div>

    <script>
      var app = angular.module("filter", []);

      app.controller("stuCtrl", function ($scope) {
        $scope.stunames = ["Aly", "mhmd", "Hady"];
        $scope.count = 0;
      });
      app.filter("cap", function () {
        return function (input) {
          return input.charAt(0).toUpperCase() + input.slice(1);
        };
      });
      app.directive("myMessage", function () {
        return {
          scope: { title: "@" },
          template: `<div class="card col-4 mb-3 " style="width: 18rem;">
        <img src="https://images.pexels.com/photos/12909944/pexels-photo-12909944.jpeg" class="card-img-top" alt="...">
        <div class="card-body">
          <h5 class="card-title">{{title}}</h5>
        </div>
        </div>`,
        };
      });
      app.directive("counter", function () {
        return {
          scope: { count: "=" },
          template: ` <button
            type="button"
            class="btn btn-primary"
            data-bs-toggle="button"
            aria-pressed="false"
            autocomplete="off"
            ng-click="Increment()"

          >
            increase
          </button>
          <p class="text-center mt-3">counter: {{count}}</p>
          <button
            type="button"
            class="btn btn-primary"
            data-bs-toggle="button"
            aria-pressed="false"
            autocomplete="off"
            ng-click= "Decrement()"
          >
            decrease
          </button>
          `,
          link: function (scope) {
            scope.Increment = function () {
              scope.count++;
            };
            scope.Decrement = function () {
              scope.count--;
            };
          },
        };
      });
    </script>
  </body>
</html>
