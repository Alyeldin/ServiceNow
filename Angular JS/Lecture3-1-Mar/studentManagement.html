<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Management UI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="d-flex mt-5 bg-light align-items-center justify-content-center">
    <div class="container" ng-app="stuList" ng-controller="stuCtrl">
      <div class="form-container">
        <h4 class="text-center mb-4">Student Managment System</h4>

        <div class="input-group mb-3">
          <input
            ng-model="search"
            type="text"
            class="form-control"
            placeholder="Search students..."
          />
          <button
            ng-click="filterStudents()"
            class="btn btn-outline-secondary"
            type="button"
            id="button-addon2"
          >
            Search
          </button>
        </div>

        <div class="form-group">
          <label for="sortSelect">Sort by:</label>
          <select
            id="sortSelect"
            name="sortSelect"
            ng-model="sortKey"
            class="form-control"
          >
            <option value="name">Name</option>
            <option value="mark">Mark</option>
          </select>
        </div>
      </div>

      <div class="text-center mt-4 text-muted" ng-if="stuArr.length === 0">
        No students added yet.
      </div>

      <table
        ng-show="stuArr.length > 0"
        class="table table-striped mt-4 text-center"
      >
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Mark</th>
          </tr>
        </thead>
        <tbody>
          <tr
            ng-repeat="student in stuSearch() | orderBy: sortKey : reverseSort "
          >
            <td>{{ $index + 1 }}</td>
            <td ng-class="{'text-success': student.mark > 80 }">
              {{student.name}}
            </td>
            <td ng-class="{'text-danger': student.mark < 50 }">
              {{student.mark}}
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <script>
      var app = angular.module("stuList", []);
      app.controller("stuCtrl", function ($scope) {
        $scope.stuArr = [
          { name: "Aly", mark: 85 },
          { name: "Hady", mark: 80 },
          { name: "Sandy", mark: 100 },
          { name: "Dalia", mark: 77 },
          { name: "Yousef", mark: 44 },
          { name: "Mhmd", mark: 49 },
          { name: "Ahmed", mark: 89 },
        ];
        $scope.search = "";
        $scope.sortKey = "name";
        $scope.reverseSort = false;

        $scope.stuSearch = function () {
          return $scope.stuArr.filter(function (student) {
            return student.name
              .toLowerCase()
              .includes($scope.search.toLowerCase());
          });
        };

        $scope.stuSort = function (key) {
          if ($scope.sortKey === key) {
            $scope.reverseSort = !$scope.reverseSort;
          } else {
            $scope.sortKey = key;
            $scope.reverseSort = false;
          }
        };
      });
    </script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
