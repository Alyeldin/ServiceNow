<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>To-Do List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="d-flex mt-5 bg-light align-items-center justify-content-center">
    <div class="container" ng-app="todoList" ng-controller="taskCtrl">
      <div class="form-container">
        <h4 class="text-center mb-4">To-do List</h4>

        <form name="submitform" novalidate>
          <div class="mb-3">
            <label class="form-label mb-1 p-2">
              <span class="fs-5">Start Adding Tasks </span
              ><span class="fst-italic fs-6 text-secondary"
                >(Cannot be empty):
              </span>
            </label>
            <input
              type="text"
              name="name"
              class="form-control"
              placeholder="Add To-do Tasks Here...."
              ng-model="taskName"
              required
            />
          </div>
          <button
            type="submit"
            class="btn btn-primary"
            ng-disabled="!taskName || taskName.length < 3"
            ng-click="addTask()"
          >
            Add Task
          </button>
        </form>
      </div>

      <div class="text-center mt-4 text-muted" ng-if="tasks.length === 0">
        No Task has been added yet.
      </div>
      <ul class="list-group mt-4" ng-if="tasks.length > 0">
        <li
          class="list-group-item d-flex justify-content-between align-items-center"
          ng-repeat="task in tasks track by $index"
        >
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              value=""
              id="checkbox{{ $index }}"
              ng-model="task.completed"
            />
            <label
              class="form-check-label"
              for="checkbox{{ $index }}"
              ng-class="{ 'text-decoration-line-through fst-italic text-secondary ': task.completed }"
            >
              {{ task.name }}
            </label>
          </div>
          <button class="btn btn-danger btn-sm" ng-click="delete($index)">
            Delete
          </button>
        </li>
      </ul>
    </div>
    <script>
      var app = angular.module("todoList", []);
      app.controller("taskCtrl", function ($scope) {
        $scope.tasks = [];
        $scope.addTask = function () {
          $scope.tasks.push({
            name: $scope.taskName,
            completed: false,
          });
          $scope.taskName = "";
          $scope.submitform.name.$touched = false;
          $scope.submitform.name.$pristine = true;
        };
        $scope.delete = function ($index) {
          $scope.tasks.splice($index, 1);
        };
      });
    </script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
